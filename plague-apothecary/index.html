      <div class="counter"><span>☾</span><b>薬 局</b><span>✦</span></div>
    </section>

    <section class="order" id="order">
      <div class="customer" id="customer">🐭</div>
      <div class="request"><small>おきゃくさんの おねがい</small><p id="requestText">「ねむれなくて こまっています…」</p></div>
      <div class="reward">おれい<br><b>🪙 <span id="reward">3</span></b></div>
    </section>

    <section class="recipe">
      <h2 id="medicineName">おやすみ薬をつくる</h2>
      <p class="hint" id="hint">必要な材料を順番にタップしてね</p>
      <div class="ingredients">
        <button data-item="lavender"><span>🪻</span><b>月夜ラベンダー</b><em id="stock-lavender">4</em></button>
        <button data-item="berry"><span>🫐</span><b>星つぶベリー</b><em id="stock-berry">4</em></button>
        <button data-item="mushroom"><span>🍄</span><b>ぽかぽかキノコ</b><em id="stock-mushroom">4</em></button>
      </div>
      <div class="cauldron">
        <div id="slots" class="slots"><i>＋</i><i>＋</i></div>
        <button id="brew" disabled>ぐるぐる調合する</button>
      </div>
      <button id="restock" class="restock">材料を補充する（🪙 2）</button>
    </section>
  </main>
  <div id="toast" class="toast" role="status"></div>
  <script>const recipes=[
 {name:'おやすみ薬',request:'「ねむれなくて こまっています…」',customer:'🐭',items:['lavender','berry'],reward:3,msg:'すやすや眠れますように…'},
 {name:'ぽかぽか薬',request:'「からだが ひえひえです…」',customer:'🐿️',items:['mushroom','berry'],reward:4,msg:'おなかから ぽっかぽか！'},
 {name:'元気薬',request:'「なんだか げんきが出ません…」',customer:'🦔',items:['berry','mushroom'],reward:4,msg:'元気をひとさじ 入れますね'},
 {name:'夢みる薬',request:'「すてきな夢が みたいです…」',customer:'🐰',items:['lavender','mushroom'],reward:5,msg:'今夜は 星の夢かも…'}
];
const icon={lavender:'🪻',berry:'🫐',mushroom:'🍄'};
let state=JSON.parse(localStorage.getItem('tinyApothecary')||'null')||{day:1,coins:8,stars:0,stock:{lavender:4,berry:4,mushroom:4},recipe:0};
let picked=[];let muted=true;let busy=false;let audioCtx=null;let musicTimer=null;
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);
function save(){localStorage.setItem('tinyApothecary',JSON.stringify(state))}
function render(){const r=recipes[state.recipe%recipes.length];$('#day').textContent=state.day;$('#coins').textContent=state.coins;$('#stars').textContent=state.stars;$('#customer').textContent=r.customer;$('#requestText').textContent=r.request;$('#medicineName').textContent=r.name+'をつくる';$('#reward').textContent=r.reward;Object.keys(state.stock).forEach(k=>{$('#stock-'+k).textContent=state.stock[k];document.querySelector(`[data-item="${k}"]`).classList.toggle('empty',state.stock[k]<1)});$('#slots').innerHTML=[0,1].map(i=>`<i>${picked[i]?icon[picked[i]]:'＋'}</i>`).join('');$('#brew').disabled=busy||picked.length!==2}
function ensureAudio(){const AC=window.AudioContext||window.webkitAudioContext;if(!AC)return null;if(!audioCtx)audioCtx=new AC();if(audioCtx.state==='suspended')audioCtx.resume();return audioCtx}
function tone(freq,duration=.18,volume=.035,delay=0,type='sine'){const a=ensureAudio();if(!a)return;const o=a.createOscillator(),g=a.createGain(),start=a.currentTime+delay;o.type=type;o.frequency.setValueAtTime(freq,start);g.gain.setValueAtTime(.001,start);g.gain.exponentialRampToValueAtTime(volume,start+.025);g.gain.exponentialRampToValueAtTime(.001,start+duration);o.connect(g).connect(a.destination);o.start(start);o.stop(start+duration+.03)}
function beep(ok=true){if(muted)return;tone(ok?660:180,ok?.13:.22,ok?.04:.055,0,ok?'sine':'triangle')}
function playPhrase(){if(muted)return;[392,494,587,494,440,523].forEach((note,i)=>tone(note,.55,.012,i*.42,'sine'))}
function startMusic(){ensureAudio();playPhrase();clearInterval(musicTimer);musicTimer=setInterval(playPhrase,4200)}
function stopMusic(){clearInterval(musicTimer);musicTimer=null}
function toast(t){const e=$('#toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1500)}
$$('.ingredients button').forEach(b=>b.onclick=()=>{const k=b.dataset.item;if(busy||picked.length>=2)return;if(state.stock[k]<1){toast('その材料は からっぽ！');beep(false);return}state.stock[k]--;picked.push(k);save();beep();render()});
$('#brew').onclick=()=>{if(busy)return;busy=true;const r=recipes[state.recipe%recipes.length],correct=picked.every((x,i)=>x===r.items[i]);if(correct){state.coins+=r.reward;state.stars++;state.day++;state.recipe=(state.recipe+1)%recipes.length;save();$('#bubble').innerHTML=r.msg;toast('調合せいこう！ ★ひょうばん＋1');beep();render();setTimeout(()=>{picked=[];busy=false;$('#bubble').innerHTML='つぎの おきゃくさんです！<br>まちがえずに つくれるかな？';render()},900)}else{$('#bubble').innerHTML='むむっ、これは ちがう薬です…<br>順番にも気をつけてね';toast('調合しっぱい…');picked=[];busy=false;beep(false);save();render()}};
$('#restock').onclick=()=>{if(state.coins<2){toast('おかねが たりません');beep(false);return}state.coins-=2;Object.keys(state.stock).forEach(k=>state.stock[k]+=2);toast('材料を 2こずつ補充したよ');save();render()};
$('#sound').onclick=()=>{muted=!muted;$('#sound').textContent=muted?'音♪':'♪ ON';$('#sound').setAttribute('aria-label',muted?'音をオンにする':'音をオフにする');if(muted)stopMusic();else startMusic();toast(muted?'音をオフにしました':'音をオンにしました')};
render();
</script>
  <script>if('serviceWorker' in navigator)addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'))</script>
